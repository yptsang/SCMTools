<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel → Weekly SKU Pivot CSV</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  .drop-zone.dragover { background-color: #eef2ff; border-color: #4f46e5; }
  table { font-size: 0.8rem; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">

<div class="max-w-6xl mx-auto p-4 sm:p-6">
  <header class="mb-6">
    <h1 class="text-2xl sm:text-3xl font-bold text-slate-800">Excel → Weekly SKU Pivot CSV</h1>
    <p class="text-slate-600 mt-1 text-sm sm:text-base">
      Upload your Excel file. Orders will be aggregated by week (Sunday–Saturday), pivoted by unique Item Number.
    </p>
  </header>

  <!-- Upload Area -->
  <div id="dropZone" class="drop-zone bg-white border-2 border-dashed border-slate-300 rounded-xl p-8 text-center cursor-pointer hover:border-indigo-400 transition">
    <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <p class="mt-3 text-slate-700 font-medium">Click to upload or drag & drop your Excel file</p>
    <p class="text-xs text-slate-500 mt-1">.xlsx or .xls files with the expected 9 columns</p>
    <input type="file" id="fileInput" accept=".xlsx,.xls" class="hidden">
  </div>

  <!-- Options -->
  <div class="mt-4 bg-white rounded-xl p-4 shadow-sm">
    <div class="flex flex-wrap gap-4 items-center text-sm">
      <label class="flex items-center gap-2">
        <span class="text-slate-700 font-medium">Week numbering:</span>
        <select id="weekMode" class="border border-slate-300 rounded px-2 py-1">
          <option value="calendar">Calendar week of year (Sun–Sat)</option>
          <option value="sequential">Sequential (1, 2, 3…)</option>
        </select>
      </label>
      <label class="flex items-center gap-2">
        <input type="checkbox" id="includeYear" checked class="rounded">
        <span class="text-slate-700">Include year in week label (e.g. 2022-W10)</span>
      </label>
    </div>
  </div>

  <!-- Status -->
  <div id="status" class="mt-4 hidden"></div>

  <!-- Summary -->
  <div id="summary" class="mt-4 hidden bg-white rounded-xl p-4 shadow-sm">
    <h2 class="text-lg font-semibold text-slate-800 mb-2">Summary</h2>
    <div id="summaryContent" class="text-sm text-slate-700 grid grid-cols-2 sm:grid-cols-4 gap-3"></div>
  </div>

  <!-- Actions -->
  <div id="actions" class="mt-4 hidden flex flex-wrap gap-2">
    <button id="downloadBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg font-medium shadow">
      ⬇ Download CSV
    </button>
    <button id="resetBtn" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-5 py-2 rounded-lg font-medium">
      Reset
    </button>
  </div>

  <!-- Preview -->
  <div id="previewWrap" class="mt-6 hidden bg-white rounded-xl shadow-sm overflow-hidden">
    <div class="p-4 border-b border-slate-200 flex justify-between items-center">
      <h2 class="text-lg font-semibold text-slate-800">Preview (first 15 rows)</h2>
      <span id="previewMeta" class="text-xs text-slate-500"></span>
    </div>
    <div class="overflow-auto max-h-96">
      <table id="previewTable" class="min-w-full divide-y divide-slate-200"></table>
    </div>
  </div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const statusEl = document.getElementById('status');
  const summaryEl = document.getElementById('summary');
  const summaryContent = document.getElementById('summaryContent');
  const actionsEl = document.getElementById('actions');
  const previewWrap = document.getElementById('previewWrap');
  const previewTable = document.getElementById('previewTable');
  const previewMeta = document.getElementById('previewMeta');
  const downloadBtn = document.getElementById('downloadBtn');
  const resetBtn = document.getElementById('resetBtn');
  const weekModeSel = document.getElementById('weekMode');
  const includeYearChk = document.getElementById('includeYear');

  let processedCSV = null;
  let processedFileName = 'weekly_sku_pivot.csv';
  let rawData = null;

  function showStatus(msg, type='info') {
    const colors = {
      info: 'bg-blue-50 border-blue-200 text-blue-800',
      error: 'bg-red-50 border-red-200 text-red-800',
      success: 'bg-green-50 border-green-200 text-green-800'
    };
    statusEl.className = `mt-4 p-3 rounded-lg border ${colors[type]}`;
    statusEl.textContent = msg;
    statusEl.classList.remove('hidden');
  }

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) handleFile(e.target.files[0]);
  });

  weekModeSel.addEventListener('change', () => { if (rawData) processData(rawData); });
  includeYearChk.addEventListener('change', () => { if (rawData) processData(rawData); });

  function handleFile(file) {
    processedFileName = file.name.replace(/\.(xlsx|xls)$/i, '') + '_weekly_pivot.csv';
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array', cellDates: true });
        const firstSheet = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(firstSheet, { defval: null, raw: true });
        if (!json.length) { showStatus('The file appears to be empty.', 'error'); return; }
        rawData = json;
        processData(json);
      } catch (err) {
        console.error(err);
        showStatus('Failed to parse the Excel file: ' + err.message, 'error');
      }
    };
    reader.readAsArrayBuffer(file);
  }

  // Parse a date value (could be Date object from xlsx, a number, or a string)
  function parseDate(val) {
    if (val == null) return null;
    if (val instanceof Date) return val;
    if (typeof val === 'number') {
      // Excel serial
      const d = XLSX.SSF.parse_date_code(val);
      if (d) return new Date(d.y, d.m - 1, d.d);
      return null;
    }
    if (typeof val === 'string') {
      const s = val.trim();
      // Try M/D/YYYY or D/M/YYYY formats - assume M/D/YYYY as in the sample
      const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
      if (m) {
        let [ , a, b, y] = m;
        a = +a; b = +b; y = +y;
        if (y < 100) y += 2000;
        // Assume M/D/YYYY based on sample (3/10/2022)
        return new Date(y, a - 1, b);
      }
      const d = new Date(s);
      return isNaN(d) ? null : d;
    }
    return null;
  }

  // Get Sunday of the week containing the date
  function getWeekStart(date) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    d.setDate(d.getDate() - d.getDay()); // Sunday=0
    return d;
  }

  // Calendar week number (weeks start Sunday; week 1 contains Jan 1)
  function getCalendarWeek(date) {
    const startOfYear = new Date(date.getFullYear(), 0, 1);
    const dayOfYear = Math.floor((date - startOfYear) / 86400000) + 1;
    return Math.ceil((dayOfYear + startOfYear.getDay()) / 7);
  }

  function fmtDate(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function csvEscape(v) {
    if (v == null) return '';
    const s = String(v);
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function processData(rows) {
    try {
      // Normalize column names (case-insensitive, trimmed)
      const keyMap = {};
      Object.keys(rows[0]).forEach(k => { keyMap[k.trim().toLowerCase()] = k; });

      const dateKey = keyMap['order date'];
      const itemKey = keyMap['item number'];
      const qtyKey = keyMap['order qty'];

      if (!dateKey || !itemKey || !qtyKey) {
        showStatus('Missing required columns. Need: Order Date, Item Number, Order qty.', 'error');
        return;
      }

      const weekMap = new Map(); // key: weekStart ISO -> { start, end, items: Map(item -> qty) }
      const items = new Set();
      let skipped = 0;

      for (const row of rows) {
        const d = parseDate(row[dateKey]);
        const item = row[itemKey] != null ? String(row[itemKey]).trim() : '';
        const qty = Number(row[qtyKey]) || 0;
        if (!d || !item) { skipped++; continue; }

        const ws = getWeekStart(d);
        const key = fmtDate(ws);
        if (!weekMap.has(key)) {
          const we = new Date(ws); we.setDate(we.getDate() + 6);
          weekMap.set(key, { start: ws, end: we, items: new Map() });
        }
        const bucket = weekMap.get(key);
        bucket.items.set(item, (bucket.items.get(item) || 0) + qty);
        items.add(item);
      }

      if (weekMap.size === 0) {
        showStatus('No valid rows found after parsing.', 'error');
        return;
      }

      // Sort weeks
      const weeks = [...weekMap.values()].sort((a, b) => a.start - b.start);
      const itemList = [...items].sort();

      // Week labels
      const mode = weekModeSel.value;
      const withYear = includeYearChk.checked;
      const weekLabels = weeks.map((w, i) => {
        if (mode === 'sequential') {
          return withYear ? `${w.start.getFullYear()}-W${String(i + 1).padStart(2, '0')}` : `W${i + 1}`;
        } else {
          const wn = getCalendarWeek(w.start);
          return withYear ? `${w.start.getFullYear()}-W${String(wn).padStart(2, '0')}` : `W${wn}`;
        }
      });

      // Build CSV
      const header = ['Week', 'Start Date', 'End Date', ...itemList];
      const lines = [header.map(csvEscape).join(',')];
      const previewRows = [header];

      weeks.forEach((w, i) => {
        const row = [
          weekLabels[i],
          fmtDate(w.start),
          fmtDate(w.end),
          ...itemList.map(it => w.items.get(it) || 0)
        ];
        lines.push(row.map(csvEscape).join(','));
        if (previewRows.length < 16) previewRows.push(row);
      });

      processedCSV = lines.join('\n');

      // Summary
      summaryContent.innerHTML = `
        <div><div class="text-slate-500 text-xs">Rows read</div><div class="text-lg font-semibold">${rows.length.toLocaleString()}</div></div>
        <div><div class="text-slate-500 text-xs">Rows skipped</div><div class="text-lg font-semibold">${skipped.toLocaleString()}</div></div>
        <div><div class="text-slate-500 text-xs">Unique weeks</div><div class="text-lg font-semibold">${weeks.length.toLocaleString()}</div></div>
        <div><div class="text-slate-500 text-xs">Unique SKUs</div><div class="text-lg font-semibold">${itemList.length.toLocaleString()}</div></div>
      `;
      summaryEl.classList.remove('hidden');

      // Preview table
      previewTable.innerHTML = '';
      const thead = document.createElement('thead');
      thead.className = 'bg-slate-50 sticky top-0';
      const trH = document.createElement('tr');
      previewRows[0].forEach(h => {
        const th = document.createElement('th');
        th.className = 'px-2 py-2 text-left font-semibold text-slate-700 whitespace-nowrap border-r border-slate-200';
        th.textContent = h;
        trH.appendChild(th);
      });
      thead.appendChild(trH);
      previewTable.appendChild(thead);

      const tbody = document.createElement('tbody');
      tbody.className = 'divide-y divide-slate-100';
      for (let r = 1; r < previewRows.length; r++) {
        const tr = document.createElement('tr');
        tr.className = r % 2 ? 'bg-white' : 'bg-slate-50/50';
        previewRows[r].forEach((c, idx) => {
          const td = document.createElement('td');
          td.className = 'px-2 py-1.5 text-slate-700 whitespace-nowrap border-r border-slate-100';
          if (idx >= 3 && c === 0) td.className += ' text-slate-300';
          td.textContent = c;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      }
      previewTable.appendChild(tbody);

      previewMeta.textContent = `${weeks.length} week rows × ${itemList.length} SKU columns`;
      previewWrap.classList.remove('hidden');
      actionsEl.classList.remove('hidden');
      actionsEl.classList.add('flex');

      const msg = skipped > 0
        ? `Processed ${rows.length - skipped} rows successfully (${skipped} skipped due to missing date or item).`
        : `Processed ${rows.length} rows successfully.`;
      showStatus(msg, 'success');
    } catch (err) {
      console.error(err);
      showStatus('Error processing data: ' + err.message, 'error');
    }
  }

  downloadBtn.addEventListener('click', () => {
    if (!processedCSV) return;
    const blob = new Blob(['\ufeff' + processedCSV], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = processedFileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  resetBtn.addEventListener('click', () => {
    processedCSV = null;
    rawData = null;
    fileInput.value = '';
    statusEl.classList.add('hidden');
    summaryEl.classList.add('hidden');
    previewWrap.classList.add('hidden');
    actionsEl.classList.add('hidden');
    actionsEl.classList.remove('flex');
  });
</script>

</body>
</html>
